name: "Test"

# actions-up-ignore-file

on:
  workflow_dispatch:
  #schedule:
  #  - cron: "18 18 * * 1,3,5"
  #push:
  #  branches: [master]
  #  paths:
  #    - "dist/**"
  #    - "src/**"
  #    - ".github/workflows/test.yaml"
  #    - "package*.json"
  #    - "requirements*.txt"
  #    - "action.yml"
  #pull_request:

env:
  crawler-id: "740ca24d-65fd-4f25-b397-16ebcec2f7fd" # django-files-docs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Debug event.json"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"
      - name: "Debug CTX github"
        if: ${{ !github.event.act }}
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"
      - name: "Debug Environment"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: env

      - name: "Debug"
        continue-on-error: true
        run: |
          ls -lah .

      - name: "Setup Node"
        if: ${{ !github.event.act }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: "Install & Build"
        if: ${{ !github.event.act }}
        run: |
          npm ci

      - name: "Test Local Action"
        #if: ${{ env.crawler-id != '' }}
        id: test
        uses: ./
        with:
          crawler_id: ${{ env.crawler-id }}
          #crawler_id: ${{ secrets.CRAWLER_ID }}
          crawler_user_id: ${{ secrets.CRAWLER_USER_ID }}
          crawler_api_key: ${{ secrets.CRAWLER_API_KEY }}

      - name: "Debug test.outputs"
        #if: ${{ !github.event.act }}
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(steps.test.outputs) }}
        run: echo "$GITHUB_CTX"

      - name: "Validate Outputs"
        #if: ${{ !github.event.act }}
        uses: cssnr/validate-outputs-action@master
        with:
          outputs: ${{ toJSON(steps.test.outputs) }}
          data: |
            status: 200
            task_id:

      #- name: "Schedule Failure Notification"
      #  if: ${{ failure() && github.event_name == 'schedule' }}
      #  uses: sarisia/actions-status-discord@v1
      #  with:
      #    webhook: ${{ secrets.DISCORD_WEBHOOK }}
      #    description: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
